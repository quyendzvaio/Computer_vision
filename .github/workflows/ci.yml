name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r edge/requirements.txt
          pip install pytest onnxruntime pyyaml
      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/test_edge_sender.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linter
        run: pip install flake8
      - name: Lint edge
        run: flake8 edge/ --max-line-length=120 --ignore=E402,W503,F401
      - name: Lint gpu
        run: flake8 gpu/ --max-line-length=120 --ignore=E402,W503,F401
