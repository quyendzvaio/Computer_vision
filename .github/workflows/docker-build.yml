name: Docker Build & Push
on:
  push:
    branches: [main, master]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  edge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile.edge
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/edge:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/edge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gpu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile.gpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/gpu:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/gpu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
