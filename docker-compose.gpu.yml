services:
  cv-server:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: cv-safety-server:latest
    container_name: cv-server
    restart: unless-stopped
    ports:
      - "5555:5555"
      - "5556:5556"
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./gpu/models:/app/gpu/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    shm_size: 256m
