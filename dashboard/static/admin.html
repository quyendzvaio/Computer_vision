<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI Tool — CV Safety Monitor</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<!-- Top Bar -->
<header id="topbar">
  <div class="logo">
    <div class="icon">&#x1F3D7;</div>
    <span>CV Safety Monitor</span>
  </div>
  <span class="page-label">ROI Configuration Tool</span>
</header>

<div class="page-container">
  <h2>&#x1F3AF; ROI Polygon Tool</h2>

  <div class="controls">
    <select id="camera-select" class="form-select">
      <option value="">— Select Camera —</option>
    </select>
    <button class="btn btn-primary" onclick="ROITool.loadROI()">&#x1F4E5; Load Saved ROI</button>
    <button class="btn btn-primary" onclick="ROITool.saveROI()">&#x1F4BE; Save ROI</button>
    <button class="btn btn-secondary" onclick="ROITool.undoPoint()">&#x21A9; Undo Point</button>
    <button class="btn btn-danger" onclick="ROITool.clearROI()">&#x2715; Clear</button>
  </div>

  <div id="roi-canvas-wrap">
    <canvas id="roi-canvas" width="640" height="480"></canvas>
  </div>

  <div class="help-text">
    <strong>Instructions:</strong><br>
    <kbd>Click</kbd> — Add polygon vertex &nbsp;
    <kbd>Drag</kbd> — Move a vertex &nbsp;
    <kbd>Right-click</kbd> — Remove vertex &nbsp;
    <kbd>Double-click</kbd> — Close polygon<br>
    Select a camera above, then draw the ROI polygon on the preview.
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Navigation Dock -->
<nav id="nav-dock">
  <a href="/">
    <span>&#x1F4F7;</span> <span class="nav-label">Dashboard</span>
  </a>
  <a href="/admin.html" class="active">
    <span>&#x1F3AF;</span> <span class="nav-label">ROI Tool</span>
  </a>
  <a href="/history.html">
    <span>&#x1F4CB;</span> <span class="nav-label">History</span>
  </a>
</nav>

<script>
/**
 * ROI Polygon Drawing Tool
 */
var ROITool = (function () {
  'use strict';

  var canvas = document.getElementById('roi-canvas');
  var ctx = canvas.getContext('2d');
  var points = [];
  var dragIdx = -1;

  function init() {
    canvas.addEventListener('click', onClick);
    canvas.addEventListener('dblclick', onDblClick);
    canvas.addEventListener('contextmenu', onRightClick);
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', function () { dragIdx = -1; });
    loadCameras();
    draw();
  }

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function findPoint(pos, radius) {
    radius = radius || 10;
    for (var i = 0; i < points.length; i++) {
      var dx = points[i].x - pos.x;
      var dy = points[i].y - pos.y;
      if (Math.sqrt(dx * dx + dy * dy) < radius) return i;
    }
    return -1;
  }

  function onClick(e) {
    var pos = getPos(e);
    if (findPoint(pos) >= 0) return;
    if (points.length > 0 && points[0].closed) return;
    points.push({ x: pos.x, y: pos.y, closed: false });
    draw();
  }

  function onDblClick(e) {
    if (points.length < 3) return;
    points[0].closed = true;
    draw();
  }

  function onRightClick(e) {
    e.preventDefault();
    var pos = getPos(e);
    var idx = findPoint(pos);
    if (idx >= 0) {
      points.splice(idx, 1);
      if (points.length > 0) points[0].closed = false;
      draw();
    }
  }

  function onMouseDown(e) {
    var pos = getPos(e);
    var idx = findPoint(pos);
    if (idx >= 0) {
      dragIdx = idx;
    }
  }

  function onMouseMove(e) {
    if (dragIdx < 0) return;
    var pos = getPos(e);
    points[dragIdx].x = pos.x;
    points[dragIdx].y = pos.y;
    draw();
  }

  function undoPoint() {
    if (points.length === 0) return;
    points.pop();
    if (points.length > 0) points[0].closed = false;
    draw();
  }

  function clearROI() {
    points = [];
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dark background with subtle grid
    ctx.fillStyle = '#0f1419';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
    ctx.lineWidth = 0.5;
    for (var x = 0; x < canvas.width; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (var y = 0; y < canvas.height; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    if (points.length < 2) {
      points.forEach(drawPoint);
      return;
    }

    // Polygon lines
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (var i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    if (points[0].closed) {
      ctx.closePath();
    }
    ctx.strokeStyle = '#4da6ff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Fill
    if (points[0].closed && points.length >= 3) {
      ctx.fillStyle = 'rgba(77, 166, 255, 0.12)';
      ctx.fill();
    }

    points.forEach(drawPoint);
  }

  function drawPoint(p) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#4da6ff';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  async function loadCameras() {
    try {
      var resp = await fetch('/api/cameras');
      var list = await resp.json();
      var sel = document.getElementById('camera-select');
      list.forEach(function (cam) {
        var opt = document.createElement('option');
        opt.value = cam.id;
        opt.textContent = cam.id;
        sel.appendChild(opt);
      });
    } catch (e) {
      showToast('Failed to load cameras', true);
    }
  }

  async function loadROI() {
    var camId = document.getElementById('camera-select').value;
    if (!camId) {
      showToast('Select a camera first', true);
      return;
    }
    try {
      var resp = await fetch('/api/roi/' + camId);
      if (!resp.ok) {
        showToast('No ROI saved for this camera yet', true);
        return;
      }
      var data = await resp.json();
      points = data.polygon.map(function (p) { return { x: p[0], y: p[1], closed: false }; });
      if (points.length >= 3) {
        points[0].closed = true;
      }
      draw();
      showToast('ROI loaded');
    } catch (e) {
      showToast('Failed to load ROI', true);
    }
  }

  async function saveROI() {
    var camId = document.getElementById('camera-select').value;
    if (!camId) {
      showToast('Select a camera first', true);
      return;
    }
    if (points.length < 3 || !points[0].closed) {
      showToast('Draw a closed polygon first (at least 3 points, double-click to close)', true);
      return;
    }
    var polygon = points.map(function (p) { return [Math.round(p.x), Math.round(p.y)]; });
    try {
      var resp = await fetch('/api/roi/' + camId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ polygon: polygon }),
      });
      if (resp.ok) {
        showToast('ROI saved');
      } else {
        showToast('Failed to save ROI', true);
      }
    } catch (e) {
      showToast('Failed to save ROI', true);
    }
  }

  function showToast(msg, isError) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.classList.add('show');
    setTimeout(function () { toast.classList.remove('show'); }, 2500);
  }

  return {
    init: init,
    loadROI: loadROI,
    saveROI: saveROI,
    undoPoint: undoPoint,
    clearROI: clearROI
  };
})();

ROITool.init();
</script>
</body>
</html>
