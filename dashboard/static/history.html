<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Violation History — CV Safety Monitor</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  .cam-id-mono {
    font-family: var(--font-mono);
    color: var(--accent-blue);
  }
</style>
</head>
<body>

<!-- Top Bar -->
<header id="topbar">
  <div class="logo">
    <div class="icon">&#x1F3D7;</div>
    <span>CV Safety Monitor</span>
  </div>
  <span class="page-label">Violation History</span>
</header>

<div class="page-container">
  <h2>&#x1F4CB; Violation History</h2>

  <div class="filters-bar">
    <select id="filter-camera" class="form-select">
      <option value="">All Cameras</option>
    </select>
    <select id="filter-type" class="form-select">
      <option value="">All Types</option>
      <option value="FALL">FALL</option>
      <option value="NO_HELMET">NO_HELMET</option>
      <option value="NO_VEST">NO_VEST</option>
      <option value="NO_BOOT">NO_BOOT</option>
    </select>
    <input type="date" id="filter-from" class="form-input" title="From date">
    <input type="date" id="filter-to" class="form-input" title="To date">
    <button class="btn btn-primary" onclick="HistoryPage.fetchPage(1)">&#x1F50D; Filter</button>
  </div>

  <table class="data-table" id="violations-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Camera</th>
        <th>Type</th>
        <th>Severity</th>
        <th>Time</th>
        <th>Thumbnail</th>
      </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
  </table>

  <div class="empty-state" id="empty-state">No violations recorded yet.</div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Navigation Dock -->
<nav id="nav-dock">
  <a href="/">
    <span>&#x1F4F7;</span> <span class="nav-label">Dashboard</span>
  </a>
  <a href="/admin.html">
    <span>&#x1F3AF;</span> <span class="nav-label">ROI Tool</span>
  </a>
  <a href="/history.html" class="active">
    <span>&#x1F4CB;</span> <span class="nav-label">History</span>
  </a>
</nav>

<script>
var HistoryPage = (function () {
  'use strict';

  var page = 1;
  var limit = 20;

  async function init() {
    await loadCameras();
    await fetchPage(1);
  }

  async function loadCameras() {
    try {
      var resp = await fetch('/api/cameras');
      var list = await resp.json();
      var sel = document.getElementById('filter-camera');
      list.forEach(function (cam) {
        var opt = document.createElement('option');
        opt.value = cam.id;
        opt.textContent = cam.id;
        sel.appendChild(opt);
      });
    } catch (e) {
      console.warn('Failed to load cameras');
    }
  }

  async function fetchPage(pg) {
    page = pg;
    var params = new URLSearchParams();
    params.set('limit', String(limit));
    params.set('offset', String((page - 1) * limit));

    var cam = document.getElementById('filter-camera').value;
    var type = document.getElementById('filter-type').value;
    var from = document.getElementById('filter-from').value;
    var to = document.getElementById('filter-to').value;

    if (cam) params.set('camera_id', cam);
    if (type) params.set('type', type);
    if (from) params.set('from_time', from + 'T00:00:00');
    if (to) params.set('to_time', to + 'T23:59:59');

    try {
      var resp = await fetch('/api/violations?' + params.toString());
      var data = await resp.json();

      var tbody = document.getElementById('table-body');
      var empty = document.getElementById('empty-state');

      if (data.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        tbody.innerHTML = data.map(function (v) {
          var sevLower = (v.severity || 'medium').toLowerCase();
          return '<tr>' +
            '<td>#' + v.id + '</td>' +
            '<td><span class="cam-id-mono">' + v.camera_id + '</span></td>' +
            '<td>' + v.type + '</td>' +
            '<td><span class="badge badge-' + sevLower + '">' + (v.severity || 'N/A') + '</span></td>' +
            '<td>' + new Date(v.created_at).toLocaleString() + '</td>' +
            '<td>' +
              (v.thumbnail_path
                ? '<img class="thumbnail-sm" src="/api/violations/' + v.id + '/thumbnail"' +
                  ' onclick="window.open(\'/api/violations/' + v.id + '/thumbnail\')" alt="thumb">'
                : '—') +
            '</td>' +
          '</tr>';
        }).join('');
      }

      renderPagination(data.length);
    } catch (e) {
      console.error('Failed to fetch violations:', e);
    }
  }

  function renderPagination(resultCount) {
    var pag = document.getElementById('pagination');
    var hasMore = resultCount >= limit;
    var hasPrev = page > 1;

    var html = '';
    html += '<button ' + (hasPrev ? '' : 'disabled') + ' onclick="HistoryPage.fetchPage(' + (page - 1) + ')">← Prev</button>';
    html += '<button class="active">' + page + '</button>';
    html += '<button ' + (hasMore ? '' : 'disabled') + ' onclick="HistoryPage.fetchPage(' + (page + 1) + ')">Next →</button>';
    pag.innerHTML = html;
  }

  return {
    init: init,
    fetchPage: fetchPage
  };
})();

HistoryPage.init();
</script>
</body>
</html>
