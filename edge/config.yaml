# Edge device config for CV Safety Monitor v2
gpu_host: 172.20.10.3  # GPU server IP (change to match your network)

# JPEG quality 0-100 (lower = smaller bandwidth, lower quality)
jpeg_quality: 55

cameras:
  - id: cam1
    device_path: 0
    zmq_port: 5555
    fps: 5
    resolution: [320, 240]

  - id: cam2
    device_path: 1
    zmq_port: 5556
    fps: 5
    resolution: [320, 240]
