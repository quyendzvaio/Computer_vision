# Edge device config for CV Safety Monitor v2
# GPU server address
# Edge uses network_mode:host → 127.0.0.1 works because GPU publishes ports
gpu_host: 172.20.10.3

# JPEG quality 0-100 (lower = smaller bandwidth, lower quality)
jpeg_quality: 55

cameras:
  - id: cam1
    device_path: 0
    zmq_port: 5555
    fps: 5
    resolution: [320, 240]

  - id: cam2
    device_path: 1
    zmq_port: 5556
    fps: 5
    resolution: [320, 240]
