services:
  cv-server:
    build: .
    image: cv-safety-server:latest
    container_name: cv-server
    restart: unless-stopped
    ports:
      - "5555:5555"   # ZMQ cam1
      - "5556:5556"   # ZMQ cam2
      - "8080:8080"   # Web dashboard
    volumes:
      - ./data:/app/data
      - ./gpu/models:/app/gpu/models:ro
      - ./edge/config.yaml:/app/edge/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
      - QT_QPA_PLATFORM=offscreen
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 256m
