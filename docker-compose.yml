version: "3.8"

services:
  cv-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: cv-safety-monitor:latest
    container_name: cv-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./edge/config.yaml:/app/edge/config.yaml:ro
    # USB webcam access — map all /dev/video* devices
    # If you know your camera's exact device, use e.g. "/dev/video0:/dev/video0"
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video1:/dev/video1"
    environment:
      - PYTHONUNBUFFERED=1
    # Grant access to video device nodes
    group_add:
      - "44"  # video group (typical on Linux)
    # Optional: uncomment if using Mosquitto
    # depends_on:
    #   - mqtt

  # Optional MQTT broker for remote cameras
  # mqtt:
